<section class="news">
  <h2>Noticias</h2>

  <ng-container *ngIf="!contentHtml; else detail">
    <div class="news-card" *ngFor="let item of items" (click)="open(item)">
      <div>
        <p class="card-title">{{ item.title }}</p>
        <p class="card-date">{{ item.date }}</p>
      </div>
      <span class="arrow">&rsaquo;</span>
    </div>
    <p *ngIf="items.length === 0" class="empty">No hay noticias. Añade archivos Markdown en <code>src/assets/content/news</code>.</p>
  </ng-container>

  <ng-template #detail>
    <article class="news-detail">
      <h3>{{ title }}</h3>
      <div [innerHTML]="contentHtml"></div>
      <a class="back-link" routerLink="/noticias">← Volver a la lista</a>
    </article>
  </ng-template>
</section>
